<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login — Payroll</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  </head>
  <style>
    :root {
      --brand: #1e40af;
      --brand-light: #3b82f6;
      --brand-dark: #1e3a8a;
      --accent: #38bdf8;
      --bg: #dde6f0;
      --surface: #ffffff;
      --surface2: #e8eef7;
      --border: rgba(30, 64, 175, 0.16);
      --text: #0c1a2e;
      --muted: #476080;
      --success: #10b981;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
    }

    /* Animated background */
    .bg-canvas {
      position: fixed; inset: 0; z-index: 0;
      overflow: hidden;
    }
    .bg-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.35;
      animation: drift 12s ease-in-out infinite alternate;
    }
    .bg-orb-1 { width: 520px; height: 520px; background: #93c5fd; top: -180px; left: -140px; animation-delay: 0s; }
    .bg-orb-2 { width: 400px; height: 400px; background: #1e3a8a; bottom: -160px; right: -100px; animation-delay: -4s; }
    .bg-orb-3 { width: 300px; height: 300px; background: #60a5fa; top: 40%; right: 10%; animation-delay: -8s; }

    @keyframes drift {
      from { transform: translate(0, 0) scale(1); }
      to { transform: translate(30px, 20px) scale(1.06); }
    }

    /* Grid overlay */
    .bg-grid {
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(30,64,175,0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(30,64,175,0.08) 1px, transparent 1px);
      background-size: 48px 48px;
    }

    /* Main layout */
    .main {
      position: relative; z-index: 1;
      width: 100dvw; height: 100dvh;
      display: flex; align-items: center; justify-content: center;
    }

    /* Card */
    .card {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(24px);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px 44px 36px;
      width: 420px;
      box-shadow:
        0 0 0 1px rgba(13,148,136,0.06),
        0 32px 80px rgba(13,148,136,0.14),
        inset 0 1px 0 rgba(255,255,255,0.9);
      animation: cardIn 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(24px) scale(0.97); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Logo area */
    .logo-area {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 28px;
    }
    .logo-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--brand), var(--brand-light));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 16px rgba(13,148,136,0.4);
    }
    .logo-text {
      font-family: 'Syne', sans-serif;
      font-weight: 700; font-size: 15px;
      letter-spacing: -0.3px;
      color: var(--text);
    }
    .logo-text span { color: var(--brand); }

    /* Header */
    .card-header { margin-bottom: 28px; }
    .card-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700; font-size: 24px;
      letter-spacing: -0.5px;
      line-height: 1.2;
    }
    .card-subtitle {
      font-size: 13.5px; color: var(--muted);
      margin-top: 5px;
    }

    /* Role selector */
    .role-row {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 22px;
    }
    .role-label {
      font-size: 13px; color: var(--muted);
      font-weight: 500; white-space: nowrap;
    }
    .role-select-wrap {
      position: relative; flex: 1;
    }
    .role-select-wrap::after {
      content: '▾';
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      color: var(--brand-light); font-size: 12px; pointer-events: none;
    }
    select[name="role"] {
      width: 100%;
      appearance: none;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      padding: 8px 32px 8px 12px;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    select[name="role"]:focus { outline: none; border-color: var(--brand-light); }
    select[name="role"] option { background: #fff; color: var(--text); }

    /* Form fields */
    .field { margin-bottom: 18px; }
    .field-label {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 7px;
    }
    .field-label span {
      font-size: 13px; font-weight: 500; color: var(--muted);
      letter-spacing: 0.2px;
    }
    .field-label a {
      font-size: 12px; color: var(--brand);
      text-decoration: none;
      transition: color 0.2s;
    }
    .field-label a:hover { color: var(--brand-dark); }

    .field input[type="email"],
    .field input[type="password"] {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      padding: 11px 14px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .field input:focus {
      outline: none;
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(13,148,136,0.12);
    }
    .field input::placeholder { color: rgba(77,120,116,0.4); }

    /* Stay signed in */
    .check-row {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 24px;
    }
    .check-row input[type="checkbox"] {
      width: 16px; height: 16px;
      accent-color: var(--brand);
      cursor: pointer;
    }
    .check-row p { font-size: 13px; color: var(--muted); }

    /* Submit button */
    .btn-signin {
      width: 100%;
      background: linear-gradient(135deg, var(--brand-dark) 0%, var(--brand-light) 100%);
      border: none;
      border-radius: 11px;
      color: white;
      font-family: 'Syne', sans-serif;
      font-weight: 600; font-size: 15px;
      letter-spacing: 0.3px;
      padding: 13px;
      cursor: pointer;
      position: relative; overflow: hidden;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 4px 20px rgba(13,148,136,0.4);
    }
    .btn-signin::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
      opacity: 0; transition: opacity 0.2s;
    }
    .btn-signin:hover::before { opacity: 1; }
    .btn-signin:hover { transform: translateY(-1px); box-shadow: 0 8px 28px rgba(13,148,136,0.5); }
    .btn-signin:active { transform: translateY(0); }

    /* Divider */
    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: 20px 0 16px;
    }
    .divider hr { flex: 1; border: none; border-top: 1px solid var(--border); }
    .divider span { font-size: 12px; color: var(--muted); }

    /* Footer */
    .card-footer {
      text-align: center;
      font-size: 13px; color: var(--muted);
      margin-top: 16px;
    }
    .card-footer a { color: var(--brand); text-decoration: none; }
    .card-footer a:hover { color: var(--brand-dark); }

    /* Pill badges (decorative) */
    .pill-badge {
      position: fixed;
      font-family: 'Syne', sans-serif;
      font-size: 11px; font-weight: 600;
      letter-spacing: 1px; text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 100px;
      border: 1px solid var(--border);
      color: var(--muted);
      background: rgba(255,255,255,0.7);
      backdrop-filter: blur(8px);
      z-index: 2;
    }
    .pill-badge.tl { top: 24px; left: 28px; }
    .pill-badge.br { bottom: 24px; right: 28px; }

    /* Error alert */
    .error-toast {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-80px);
      background: #7f1d1d; border: 1px solid #ef4444;
      color: white; padding: 10px 22px; border-radius: 8px;
      font-size: 14px; z-index: 100;
      transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .error-toast.show { transform: translateX(-50%) translateY(0); }

    /* Mobile */
    @media (max-width: 480px) {
      .card { width: 90vw; padding: 30px 24px; }
      .pill-badge { display: none; }
    }
  </style>
  <body>
    <div class="bg-canvas">
      <div class="bg-orb bg-orb-1"></div>
      <div class="bg-orb bg-orb-2"></div>
      <div class="bg-orb bg-orb-3"></div>
    </div>
    <div class="bg-grid"></div>

    <div class="pill-badge tl">Payroll System</div>
    <div class="pill-badge br">Secure Access</div>

    <div id="errorToast" class="error-toast">Invalid credentials. Please try again.</div>

    <div class="main">
      <div class="card">
        <!-- Logo -->
        <div class="logo-area">
          <div class="logo-icon">
            <!-- Payroll management icon: coin with currency lines -->
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <circle cx="12" cy="12" r="9" stroke="white" stroke-width="1.8"/>
              <path d="M12 6v1.5M12 16.5V18" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
              <path d="M9.5 9.5C9.5 8.4 10.6 7.5 12 7.5s2.5.9 2.5 2c0 1-1.1 1.8-2.5 1.8S9.5 12.1 9.5 13c0 1.1 1.1 2 2.5 2s2.5-.9 2.5-2" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
          </div>
          <div class="logo-text">Payroll <span>Management</span></div>
        </div>

        <!-- Header -->
        <div class="card-header">
          <div class="card-title">Welcome back</div>
          <div class="card-subtitle">Sign in to access your payroll dashboard</div>
        </div>

        <!-- Form -->
        <form action="{% url 'login' %}" method="post">
          {% csrf_token %}

          <!-- Role -->
          <div class="role-row">
            <span class="role-label">Signing in as</span>
            <div class="role-select-wrap">
              <select name="role" id="role">
                <option value="Employee">Employee</option>
                <option value="Employer">Employer</option>
                <option value="TeamLead">Team Lead</option>
              </select>
            </div>
          </div>

          <!-- Email -->
          <div class="field">
            <div class="field-label">
              <span>Email address</span>
            </div>
            <input type="email" name="email" id="email" placeholder="you@company.com" required />
          </div>

          <!-- Password -->
          <div class="field">
            <div class="field-label">
              <span>Password</span>
              <a href="{% url 'forgot_password' %}">Forgot password?</a>
            </div>
            <input type="password" name="password" id="password" placeholder="••••••••" />
          </div>

          <!-- Stay signed in -->
          <div class="check-row">
            <input type="checkbox" name="" id="stay" />
            <p>Stay signed in</p>
          </div>

          <!-- Submit -->
          <button type="submit" class="btn-signin">Sign In</button>
        </form>

        <div class="card-footer">
          Don't have an account? <a href="#">Contact your administrator</a>
        </div>
      </div>
    </div>

    <script>
      var x = "{{failed}}";
      if (x && x !== "False" && x !== "") {
        var toast = document.getElementById("errorToast");
        toast.classList.add("show");
        setTimeout(function () { toast.classList.remove("show"); }, 4000);
        x = "";
      }
    </script>
  </body>
</html>
